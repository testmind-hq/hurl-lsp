name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Build and upload artifacts without creating GitHub Release"
        required: false
        type: boolean
        default: true

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  binaries:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            ext: ""
            archive: tar.gz
          - runner: macos-latest
            target: aarch64-apple-darwin
            ext: ""
            archive: tar.gz
          - runner: macos-15-intel
            target: x86_64-apple-darwin
            ext: ""
            archive: tar.gz
          - runner: windows-latest
            target: x86_64-pc-windows-msvc
            ext: ".exe"
            archive: zip
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          target: ${{ matrix.target }}
      - name: Install Linux native dependencies
        if: ${{ runner.os == 'Linux' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y libxml2-dev pkg-config
      - name: Install Windows native dependencies
        if: ${{ runner.os == 'Windows' }}
        shell: pwsh
        run: |
          if ($env:VCPKG_INSTALLATION_ROOT) {
            $vcpkgRoot = $env:VCPKG_INSTALLATION_ROOT
          } elseif (Test-Path "C:\vcpkg") {
            $vcpkgRoot = "C:\vcpkg"
          } else {
            throw "Cannot find vcpkg installation root."
          }
          & "$vcpkgRoot\vcpkg.exe" install libxml2:x64-windows
          "VCPKG_ROOT=$vcpkgRoot" >> $env:GITHUB_ENV
          "VCPKGRS_TRIPLET=x64-windows" >> $env:GITHUB_ENV
          "VCPKGRS_DYNAMIC=1" >> $env:GITHUB_ENV
      - name: Build
        run: cargo build --release --package hurl-lsp --target ${{ matrix.target }}
      - name: Package
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/hurl-lsp${{ matrix.ext }}" "dist/hurl-lsp${{ matrix.ext }}"
          if [ "${{ matrix.archive }}" = "zip" ]; then
            archive="hurl-lsp-${version}-${{ matrix.target }}.zip"
            powershell -Command "Compress-Archive -Path 'dist/hurl-lsp${{ matrix.ext }}' -DestinationPath '${archive}'"
          else
            tar -czf "hurl-lsp-${version}-${{ matrix.target }}.tar.gz" -C dist "hurl-lsp${{ matrix.ext }}"
          fi
      - name: Upload build artifact
        uses: actions/upload-artifact@v5
        with:
          name: hurl-lsp-${{ matrix.target }}
          path: hurl-lsp-*

  publish:
    needs: binaries
    if: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.dry_run != true) }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Download build artifacts
        uses: actions/download-artifact@v5
        with:
          path: dist
      - name: Publish GitHub Release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${GITHUB_REF_NAME}"
          gh release view "${tag}" >/dev/null 2>&1 || gh release create "${tag}" --title "${tag}" --notes ""
          find dist -type f \( -name '*.tar.gz' -o -name '*.zip' \) -print0 | xargs -0 gh release upload "${tag}" --clobber
      - name: Publish checksums
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${GITHUB_REF_NAME}"
          (
            cd dist
            find . -type f \( -name '*.tar.gz' -o -name '*.zip' \) -print0 |
              while IFS= read -r -d '' file; do
                sha="$(sha256sum "${file}" | awk '{print $1}')"
                name="$(basename "${file}")"
                echo "${sha} ${name}"
              done
          ) > SHA256SUMS
          gh release upload "${tag}" SHA256SUMS --clobber
      - name: Generate Homebrew formula from release checksums
        if: ${{ startsWith(github.ref, 'refs/tags/v') }}
        run: |
          version="${GITHUB_REF_NAME#v}"
          bash scripts/update-homebrew-formula.sh "${version}" SHA256SUMS packaging/homebrew/Formula/hurl-lsp.rb
      - name: Publish Homebrew formula to tap repository
        if: ${{ startsWith(github.ref, 'refs/tags/v') && secrets.HOMEBREW_TAP_TOKEN != '' }}
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          version="${GITHUB_REF_NAME#v}"
          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/testmind-hq/homebrew-tap.git" tap
          cp packaging/homebrew/Formula/hurl-lsp.rb tap/Formula/hurl-lsp.rb
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/hurl-lsp.rb
          if git diff --cached --quiet; then
            echo "No Homebrew formula update required."
            exit 0
          fi
          git commit -m "hurl-lsp ${version}"
          git push origin HEAD
      - name: Homebrew tap publish skipped
        if: ${{ startsWith(github.ref, 'refs/tags/v') && secrets.HOMEBREW_TAP_TOKEN == '' }}
        run: |
          echo "HOMEBREW_TAP_TOKEN is not configured; skipped publishing formula to testmind-hq/homebrew-tap."

name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Build and upload artifacts without creating GitHub Release"
        required: false
        type: boolean
        default: true

permissions:
  contents: write
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  binaries:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            ext: ""
            archive: tar.gz
          - runner: macos-latest
            target: aarch64-apple-darwin
            ext: ""
            archive: tar.gz
          - runner: macos-15-intel
            target: x86_64-apple-darwin
            ext: ""
            archive: tar.gz
          - runner: windows-latest
            target: x86_64-pc-windows-msvc
            ext: ".exe"
            archive: zip
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          target: ${{ matrix.target }}
      - name: Install Linux native dependencies
        if: ${{ runner.os == 'Linux' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y libxml2-dev pkg-config
      - name: Install Windows native dependencies
        if: ${{ runner.os == 'Windows' }}
        shell: pwsh
        run: |
          if ($env:VCPKG_INSTALLATION_ROOT) {
            $vcpkgRoot = $env:VCPKG_INSTALLATION_ROOT
          } elseif (Test-Path "C:\vcpkg") {
            $vcpkgRoot = "C:\vcpkg"
          } else {
            throw "Cannot find vcpkg installation root."
          }
          & "$vcpkgRoot\vcpkg.exe" install libxml2:x64-windows
          "VCPKG_ROOT=$vcpkgRoot" >> $env:GITHUB_ENV
          "VCPKGRS_TRIPLET=x64-windows" >> $env:GITHUB_ENV
          "VCPKGRS_DYNAMIC=1" >> $env:GITHUB_ENV
      - name: Build
        env:
          HURL_LSP_VERSION: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || '' }}
        run: cargo build --release --package hurl-lsp --target ${{ matrix.target }}
      - name: Package
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/hurl-lsp${{ matrix.ext }}" "dist/hurl-lsp${{ matrix.ext }}"
          if [ "${{ matrix.archive }}" = "zip" ]; then
            archive="hurl-lsp-${version}-${{ matrix.target }}.zip"
            powershell -Command "Compress-Archive -Path 'dist/hurl-lsp${{ matrix.ext }}' -DestinationPath '${archive}'"
          else
            tar -czf "hurl-lsp-${version}-${{ matrix.target }}.tar.gz" -C dist "hurl-lsp${{ matrix.ext }}"
          fi
      - name: Upload build artifact
        uses: actions/upload-artifact@v5
        with:
          name: hurl-lsp-${{ matrix.target }}
          path: hurl-lsp-*

  publish:
    needs: binaries
    if: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run != 'true') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Download build artifacts
        uses: actions/download-artifact@v5
        with:
          path: dist
      - name: Setup Node for VSCode extension packaging
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: editors/vscode/package-lock.json
      - name: Build VSCode extension
        working-directory: editors/vscode
        run: |
          npm ci
          npm run build
      - name: Package VSCode extension (.vsix)
        working-directory: editors/vscode
        run: npx @vscode/vsce package
      - name: Stage VSCode extension asset
        run: |
          shopt -s nullglob
          assets=(editors/vscode/*.vsix)
          if [ "${#assets[@]}" -eq 0 ]; then
            echo "No .vsix asset found to stage."
            exit 1
          fi
          cp "${assets[@]}" dist/
      - name: Publish GitHub Release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${GITHUB_REF_NAME}"
          gh release view "${tag}" >/dev/null 2>&1 || gh release create "${tag}" --title "${tag}" --notes ""
          find dist -type f \( -name '*.tar.gz' -o -name '*.zip' -o -name '*.vsix' \) -print0 | xargs -0 gh release upload "${tag}" --clobber
      - name: Publish checksums
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${GITHUB_REF_NAME}"
          (
            cd dist
            find . -type f \( -name '*.tar.gz' -o -name '*.zip' -o -name '*.vsix' \) -print0 |
              while IFS= read -r -d '' file; do
                sha="$(sha256sum "${file}" | awk '{print $1}')"
                name="$(basename "${file}")"
                echo "${sha} ${name}"
              done
          ) > SHA256SUMS
          gh release upload "${tag}" SHA256SUMS --clobber
      - name: Generate Homebrew formula from release checksums
        if: ${{ startsWith(github.ref, 'refs/tags/v') }}
        run: |
          version="${GITHUB_REF_NAME#v}"
          bash scripts/update-homebrew-formula.sh "${version}" SHA256SUMS packaging/homebrew/Formula/hurl-lsp.rb
      - name: Publish Homebrew formula to tap repository
        if: ${{ startsWith(github.ref, 'refs/tags/v') }}
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          if [ -z "${HOMEBREW_TAP_TOKEN}" ]; then
            echo "HOMEBREW_TAP_TOKEN is not configured; skipped publishing formula to testmind-hq/homebrew-tap."
            exit 0
          fi
          version="${GITHUB_REF_NAME#v}"
          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/testmind-hq/homebrew-tap.git" tap
          cp packaging/homebrew/Formula/hurl-lsp.rb tap/Formula/hurl-lsp.rb
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/hurl-lsp.rb
          if git diff --cached --quiet; then
            echo "No Homebrew formula update required."
            exit 0
          fi
          git commit -m "hurl-lsp ${version}"
          git push origin HEAD
      - name: Sync Homebrew formula back to main repository via PR
        if: ${{ startsWith(github.ref, 'refs/tags/v') }}
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
          HURL_REPO_SYNC_TOKEN: ${{ secrets.HURL_REPO_SYNC_TOKEN }}
        run: |
          version="${GITHUB_REF_NAME#v}"
          sync_branch="chore/sync-homebrew-formula-v${version}"
          repo_token="${HURL_REPO_SYNC_TOKEN:-$GH_TOKEN}"
          if [ -z "${repo_token}" ]; then
            echo "No token available for sync-back PR creation."
            exit 0
          fi
          if [ -z "${HURL_REPO_SYNC_TOKEN}" ]; then
            echo "HURL_REPO_SYNC_TOKEN is not configured; falling back to github.token."
            echo "If PR creation is blocked by repository policy, configure HURL_REPO_SYNC_TOKEN with repo write scope."
          fi
          export GH_TOKEN="${repo_token}"
          open_pr_count="$(gh pr list --base main --head "${sync_branch}" --state open --json number --jq 'length')"
          if [ "${open_pr_count}" != "0" ]; then
            echo "Sync PR already exists for ${sync_branch}."
            exit 0
          fi
          git clone --depth 1 --branch main "https://x-access-token:${repo_token}@github.com/${GITHUB_REPOSITORY}.git" source-main
          cp packaging/homebrew/Formula/hurl-lsp.rb source-main/packaging/homebrew/Formula/hurl-lsp.rb
          cd source-main
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -B "${sync_branch}"
          git add packaging/homebrew/Formula/hurl-lsp.rb
          if git diff --cached --quiet; then
            echo "Source repository formula already up to date."
            exit 0
          fi
          git commit -m "chore(homebrew): sync formula to v${version}"
          git push --force origin "${sync_branch}"
          gh pr create \
            --base main \
            --head "${sync_branch}" \
            --title "chore(homebrew): sync formula to v${version}" \
            --body "Auto-generated by release workflow after publishing v${version}." || {
              echo "Failed to create sync PR. If repository policy blocks github.token, configure HURL_REPO_SYNC_TOKEN."
              exit 1
            }
